name: Build EXE for Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller pandas openpyxl loguru

      - name: Build EXE
        run: |
          pyinstaller --onefile --console --name reconciliation main_bundle.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: reconciliation-windows
          path: dist/reconciliation.exe
          retention-days: 30
